name: Repair existing RubyHx release tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing immutable v<SemVer> tag to verify or resume
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22.23.1"
  NPM_VERSION: "10.9.8"
  HAXE_VERSION: "4.3.7"
  # The workflow file and repair implementation share one reviewed commit. Artifact source remains
  # the immutable input tag; only release reconciliation tooling is overlaid after the clean build.
  REPAIR_TOOL_SHA: ${{ github.workflow_sha }}

jobs:
  repair:
    name: Repair only the existing input tag
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Validate that the input tag already exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "repair tag must have safe v<SemVer> shape" >&2
            exit 1
          fi
          gh api -H "X-GitHub-Api-Version: 2026-03-10" \
            "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" >/dev/null

      - name: Checkout only the existing input tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: refs/tags/${{ inputs.tag }}

      - name: Setup exact Node.js without executable cache restore
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22.23.1"
          package-manager-cache: false

      - name: Setup exact Ruby and RubyGems
        uses: ruby/setup-ruby@6e5d382445ae5590b7449d8b3bc8cb1c2c27f617 # master 2026-07-12
        with:
          ruby-version: "3.4.10"
          rubygems: "3.6.9"
          bundler: none

      - name: Verify exact repair toolchain
        run: |
          set -euo pipefail
          test "$(node --version)" = "v22.23.1"
          test "$(npm --version)" = "10.9.8"
          test "$(ruby --disable-gems -e 'print RUBY_VERSION')" = "3.4.10"
          test "$(gem --version)" = "3.6.9"

      - name: Install and audit locked npm dependencies
        run: |
          set -euo pipefail
          npm ci --ignore-scripts --no-audit --no-fund
          npm audit

      - name: Install exact Haxe toolchain
        run: |
          set -euo pipefail
          # Haxe's install hook invokes `lix` by name in a child process.
          export PATH="$(pwd)/node_modules/.bin:$PATH"
          echo "$(pwd)/node_modules/.bin" >> "$GITHUB_PATH"
          ./node_modules/.bin/lix download
          ./node_modules/.bin/lix download haxe "4.3.7"
          ./node_modules/.bin/lix use haxe "4.3.7"
          test "$(haxe -version)" = "4.3.7"

      - name: Rebuild exact artifacts from the immutable input tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          SOURCE_SHA="$(git rev-parse HEAD)"
          test "$(git rev-parse "${TAG}^{commit}")" = "$SOURCE_SHA"
          node scripts/release/prepare-release-artifacts.js "$VERSION" "$TAG" "$SOURCE_SHA"

      - name: Reconcile with reviewed repair tooling and verify immutability
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          SOURCE_SHA="$(git rev-parse HEAD)"
          [[ "$REPAIR_TOOL_SHA" =~ ^[0-9a-f]{40}$ ]]
          if ! git cat-file -e "${REPAIR_TOOL_SHA}^{commit}"; then
            git fetch --no-tags origin "$REPAIR_TOOL_SHA"
          fi
          # Build is already complete. Overlay only the workflow-owned release tooling so an old
          # tag can benefit from reviewed repair fixes without checking out main or changing bytes.
          git archive "$REPAIR_TOOL_SHA" scripts/release | tar -x -C "$GITHUB_WORKSPACE"
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          test "$(git rev-parse "${TAG}^{commit}")" = "$SOURCE_SHA"
          node scripts/release/release-hosting.mjs repair "$VERSION" "$TAG" "$SOURCE_SHA"
